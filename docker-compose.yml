version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: vandry-postgres
    restart: always
    environment:
      POSTGRES_DB: vandry_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: